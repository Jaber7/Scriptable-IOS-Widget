<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>التحكم بالباب</title>
  <style>
    :root {
      --bg-color: #e0e5ec;
      --text-color: #444;
      --shadow-light: #ffffff;
      --shadow-dark: #a3b1c6;
      --accent-color: #4CAF50;
    }

    body { 
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: var(--bg-color);
      color: var(--text-color);
    }
    
    .container {
      background: var(--bg-color);
      padding: 50px 30px;
      border-radius: 40px;
      box-shadow: 20px 20px 60px var(--shadow-dark), 
                 -20px -20px 60px var(--shadow-light);
      text-align: center;
      width: 85%;
      max-width: 350px;
    }

    h2 { margin-bottom: 10px; font-size: 24px; color: #2c3e50; }
    p { font-size: 14px; color: #777; margin-bottom: 40px; }

    /* الزر بتأثير الضغط الحقيقي */
    .door-btn { 
      width: 120px;
      height: 120px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-size: 16px;
      font-weight: bold;
      color: var(--text-color);
      background: var(--bg-color);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      outline: none;
      box-shadow: 9px 9px 16px var(--shadow-dark), 
                 -9px -9px 16px var(--shadow-light);
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .door-btn:active {
      box-shadow: inset 7px 7px 14px var(--shadow-dark), 
                  inset -7px -7px 14px var(--shadow-light);
      transform: scale(0.96);
    }

    .door-btn svg {
      width: 40px;
      height: 40px;
      margin-bottom: 8px;
      fill: var(--accent-color);
    }

    #status { 
      margin-top: 40px; 
      font-size: 14px; 
      padding: 10px;
      border-radius: 12px;
      transition: all 0.3s ease;
    }

    .loading { color: #eb984e; animation: pulse 1.5s infinite; }
    .success { color: #27ae60; font-weight: bold; }
    .error { color: #e74c3c; }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>مرحبا </h2>
    <p>اضغط الزر لفتح الباب 👇</p>
    
    <button id="openBtn" class="door-btn">
      <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6z"/></svg>
      فتح الباب
    </button>

    <div id="status"> </div>
  </div>

  <script>
    const WEBHOOK_URL = 'https://snpchat.online/api/webhook/open_lbb_socket_1'; 
    const btn = document.getElementById("openBtn");
    const status = document.getElementById("status");

    btn.addEventListener("click", async () => {
      status.textContent = "⌛ جاري إرسال الأمر...";
      status.className = "loading";
      
      try {
        // استخدام no-cors يتخطى معظم مشاكل المتصفحات مع الـ Webhooks
        await fetch(WEBHOOK_URL, {
          method: "POST",
          mode: "no-cors", 
          cache: "no-cache"
        });
        
        // بما أننا نستخدم no-cors لن نستطيع قراءة response.ok 
        // لكن طالما لم يحدث error في الاتصال فالأمر وصل
        status.textContent = "✅ تم إرسال طلب فتح الباب";
        status.className = "success";
        
      } catch (error) {
        status.textContent = "⚠️ فشل في الاتصال بالشبكة";
        status.className = "error";
      }
      
      // إعادة الحالة للوضع الطبيعي بعد 5 ثواني
      setTimeout(() => {
        status.textContent = " ";
        status.className = "";
      }, 5000);
    });
  </script>
</body>
</html>
